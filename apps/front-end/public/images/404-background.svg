<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Abstract storefront background</title>
  <desc id="desc">A warm-toned gradient sky above soft landscape shapes for the 404 page background.</desc>
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16324f"/>
      <stop offset="45%" stop-color="#345d7f"/>
      <stop offset="100%" stop-color="#d8b58f"/>
    </linearGradient>
    <linearGradient id="sunset" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7d6a3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f28b50" stop-opacity="0.1"/>
    </linearGradient>
