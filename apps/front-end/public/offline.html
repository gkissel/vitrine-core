<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#436939" />
    <title>Erva Mate para o Brasil offline</title>
    <style>
      :root {
        color: #24351f;
        background: #f7f4e8;
        font-family:
          ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 520px);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 8vw, 4.5rem);
        line-height: 0.95;
      }

      p {
        margin: 0 0 24px;
        color: #4c5d43;
        font:
          1rem/1.6 system-ui,
          sans-serif;
      }

      a {
        color: #f7f4e8;
        background: #436939;
        border-radius: 999px;
        display: inline-flex;
        padding: 12px 18px;
        text-decoration: none;
        font:
          700 0.875rem/1 system-ui,
          sans-serif;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sem conexão no momento.</h1>
      <p>
        A loja foi instalada, mas precisa de internet para atualizar produtos,
        carrinho e pedidos. Tente novamente quando a conexão voltar.
      </p>
      <a href="/">Tentar novamente</a>
    </main>
  </body>
</html>
